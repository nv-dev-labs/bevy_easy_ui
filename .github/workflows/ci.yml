name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux system dependencies (wayland + x11)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-0 \
            libwayland-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libudev-dev libasound2-dev \
            pkg-config
      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Check examples
        run: cargo check --examples
      - name: Build tests
        run: cargo test --no-run
      - name: Run tests
        run: cargo test
      - name: Doc
        run: cargo doc --no-deps -- -D warnings
